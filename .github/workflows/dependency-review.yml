name: Dependency Review

on:
  pull_request:
    branches: [ main ]

jobs:
  dependency-review:
    if: ${{ github.event.pull_request.base.repo.private == false }}
    # Skip when private repos lack dependency review support
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

