version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: '⬆️'
      prefix-development: '⬆️'
    labels:
      - dependencies
    groups:
      dependencies:
        dependency-type: 'production'
      devDependencies:
        dependency-type: 'development'
